<html>

<head>
    <meta charset="UTF-8" />
    <title> Playa </title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!---------- Loading screen ---------->
    <div class="init-window">
        <div class="init-box"> initializing </div>
        <div class="progress-bar">
            <div class="progression"></div>
        </div>
    </div>

    <!---------- Nav Bar / Settings ---------->
    <nav class="nav-bar">
        <h1 class="nav-brand">playa</h1>
    
        <img class="settings-icon" src="./assets/images/icon/settings-icon.svg" />
        <div class="settings">
            <div class="toggle-mode">Dark Theme: </div>
        </div>
    </nav>

    <div class="main-window-container">
    
        <!---------- Game Page window ---------->
        <div class="game-page-window">
            <video class="loop-background" src="./assets/video/background.mp4" autoplay loop muted playsinline></video>
            <div class="game-selection-window">
            </div>
        </div>

    </div>
</body>

<script src="script.js" defer></script>
</html>
