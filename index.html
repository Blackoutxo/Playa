<!---Background video by https://pixabay.com/users/gam-ol-2829280/-->
<html>

<head>
    <meta charset="UTF-8" />
    <title> Playa </title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!---------- Loading screen ---------->
    <div class="init-window">
        <div class="init-box"> initializing </div>
        <div class="progress-bar">
            <div class="progression"></div>
        </div>
    </div>

    <!---------- Nav Bar / Settings ---------->
    <nav class="nav-bar">
        <h1 class="nav-brand">playa</h1>
    
        <img class="settings-icon" /> 
    </nav>

    <div class="main-window-container">
    
        <!---------- Game Page window ---------->
        <div class="game-page-window">
            <div class="settings">
                <div class="settings-side-bar">
                    <div class="title-settings"> Settings </div>
                    <div class="theme-toggle">Dark Theme </div>
                    <div class="toggle-button">
                        <div class="toggleable-button"></div>
                    </div>
                </div>
            </div>

            <!---------- Game selection ---------->
            <div class="game-selection-window">

                <!---Snake--->
                <a class="snake-game" href="./games/snake/snake.html">
                    <img class="snake-img" src="./assets/images/game/snake/Snake.png"/>
                    <span class="snake-title"> Snake </span>
                </a>

                <!---Tetris--->
                <a class="tetris-game" href="./games/tetris/tetris.html">
                    <img class="tetris-img" src="./assets/images/game/tetris/Tetris side T.png" />
                    <span class="tetris-title"> Tetris </span>
                </a>

                <!---Gravity--->
                
            </div>

            <video class="loop-background" src="./assets/video/background.mp4" autoplay loop muted playsinline></video>
        </div>

    </div>
</body>

<script src="script.js" defer></script>
</html>
