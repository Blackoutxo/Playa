<html>
    <meta charset="UTF-8">
    <title> Minesweeper </title>
    <link rel="icon" type="image/png" href="">
    <link rel="stylesheet" href="minesweeper.css">


    <body>
        <!---Loading Screen--->
        <div class="header">MINESWEEPER</div>

        <div class="loading-screen">
            <div class="beginner" data-level="0">Beginner</div>
            <div class="intermediate" data-level="1">Intermediate</div>
            <div class="expert" data-level="2">Expert</div>
        </div>

        <!---Back Button--->
        <div class="back-btn-area"></div>
        <div class="back-button"> Back </div>

        <!---Game Area---> 
        <div class="game-area"> 
            <div id="grid"></div>
        </div>

        <!---NEW game button--->
        <div class="restart-btn-area"></div>
        <div class="new-game"> New Game </div>
        
        <!---Display Counts--->
        <div class="score">SCORE:<span class="score-count">0</span></div>
        <div class="mines">MINES:<span class="mine-count">0</span></div>

        <script src="minesweeper.js"></script>
    </body>
</html>
