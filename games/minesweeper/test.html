<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asymmetric Minesweeper</title>
    <style>
        body {
            background-color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background-color: #bdbdbd;
            padding: 20px;
            border: 3px solid #fff;
            border-bottom-color: #7b7b7b;
            border-right-color: #7b7b7b;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        #scoreboard {
            margin-bottom: 15px;
        }

        #reset-btn {
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #bdbdbd;
            border: 2px solid;
            border-color: #fff #7b7b7b #7b7b7b #fff;
        }

        #reset-btn:active {
            border-color: #7b7b7b #fff #fff #7b7b7b;
        }

        /* The Board Layout */
        #grid {
            display: grid;
            gap: 1px;
            background-color: #7b7b7b;
            border: 3px solid;
            border-color: #7b7b7b #fff #fff #7b7b7b;
        }

        /* Individual Cells */
        .cell {
            width: 30px;
            height: 30px;
            background-color: #bdbdbd;
            border: 3px solid;
            border-color: #fff #7b7b7b #7b7b7b #fff;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        /* Cell States */
        .cell.revealed {
            background-color: #d9d9d9;
            border: 1px solid #7b7b7b;
        }

        .cell.mine {
            background-color: red;
        }

        .cell.flagged {
            background-color: yellow;
        }

        /* Number Colors */
        .cell[data-count="1"] { color: blue; }
        .cell[data-count="2"] { color: green; }
        .cell[data-count="3"] { color: red; }
        .cell[data-count="4"] { color: darkblue; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Minesweeper</h1>
        <div id="scoreboard">
            <button id="reset-btn">New Game</button>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        // Adjust these two independent dimensions as you wish!
        const BOARD_ROWS = 8;
        const BOARD_COLS = 15; 
        const MINE_COUNT = 15;

        let board = [];
        let gameOver = false;

        const gridElement = document.getElementById('grid');
        const resetBtn = document.getElementById('reset-btn');

        function initGame() {
            gridElement.innerHTML = '';
            board = [];
            gameOver = false;
            
            // Dynamically set CSS Grid templates based on JS dimensions
            gridElement.style.gridTemplateColumns = `repeat(${BOARD_COLS}, 30px)`;
            gridElement.style.gridTemplateRows = `repeat(${BOARD_ROWS}, 30px)`;

            // 1. Generate the grid coordinates using separate row and column limits
            for (let r = 0; r < BOARD_ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < BOARD_COLS; c++) {
                    board[r][c] = {
                        row: r,
                        col: c,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0,
                        element: null
                    };
                }
            }

            // 2. Add mines randomly using their respective boundary limits
            let minesPlanted = 0;
            while (minesPlanted < MINE_COUNT) {
                let r = Math.floor(Math.random() * BOARD_ROWS);
                let c = Math.floor(Math.random() * BOARD_COLS);
                
                if (!board[r][c].isMine) {
                    board[r][c].isMine = true;
                    minesPlanted++;
                }
            }

            // 3. Pre-calculate neighbor bomb counts
            for (let r = 0; r < BOARD_ROWS; r++) {
                for (let c = 0; c < BOARD_COLS; c++) {
                    if (!board[r][c].isMine) {
                        board[r][c].neighborMines = countMinesAround(r, c);
                    }
                }
            }

            // 4. Draw HTML grid squares
            for (let r = 0; r < BOARD_ROWS; r++) {
                for (let c = 0; c < BOARD_COLS; c++) {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    
                    board[r][c].element = cellElement;
                    
                    cellElement.addEventListener('click', () => revealCell(r, c));
                    cellElement.addEventListener('contextmenu', (e) => {
                        e.preventDefault(); 
                        toggleFlag(r, c);
                    });

                    gridElement.appendChild(cellElement);
                }
            }
        }

        // Loop around coordinates up to boundaries to calculate adjacent mines
        function countMinesAround(r, c) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    let newR = r + i;
                    let newC = c + j;
                    // Checked against unique row and column limits separately
                    if (newR >= 0 && newR < BOARD_ROWS && newC >= 0 && newC < BOARD_COLS) {
                        if (board[newR][newC].isMine) count++;
                    }
                }
            }
            return count;
        }

        function revealCell(r, c) {
            if (gameOver || board[r][c].isRevealed || board[r][c].isFlagged) return;

            let cell = board[r][c];
            cell.isRevealed = true;
            cell.element.classList.add('revealed');

            if (cell.isMine) {
                endGame(false);
                return;
            }

            if (cell.neighborMines > 0) {
                cell.element.textContent = cell.neighborMines;
                cell.element.setAttribute('data-count', cell.neighborMines);
            } else {
                revealNeighbors(r, c);
            }

            checkWinCondition();
        }

        function revealNeighbors(r, c) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    let newR = r + i;
                    let newC = c + j;
                    if (newR >= 0 && newR < BOARD_ROWS && newC >= 0 && newC < BOARD_COLS) {
                        if (!board[newR][newC].isRevealed) {
                            revealCell(newR, newC);
                        }
                    }
                }
            }
        }

        function toggleFlag(r, c) {
            if (gameOver || board[r][c].isRevealed) return;

            let cell = board[r][c];
            cell.isFlagged = !cell.isFlagged;
            
            if (cell.isFlagged) {
                cell.element.classList.add('flagged');
                cell.element.textContent = '🚩';
            } else {
                cell.element.classList.remove('flagged');
                cell.element.textContent = '';
            }
        }

        function endGame(isWin) {
            gameOver = true;
            for (let r = 0; r < BOARD_ROWS; r++) {
                for (let c = 0; c < BOARD_COLS; c++) {
                    if (board[r][c].isMine) {
                        board[r][c].element.classList.add('mine');
                        board[r][c].element.textContent = '💣';
                    }
                }
            }
            setTimeout(() => alert(isWin ? 'You Win! 🎉' : 'Game Over! 💥'), 10);
        }

        function checkWinCondition() {
            for (let r = 0; r < BOARD_ROWS; r++) {
                for (let c = 0; c < BOARD_COLS; c++) {
                    if (!board[r][c].isMine && !board[r][c].isRevealed) {
                        return;
                    }
                }
            }
            endGame(true);
        }

        resetBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
