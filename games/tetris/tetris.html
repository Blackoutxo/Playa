<html>

<head>
    <meta charset="UTF-8" />
    <title> Tetris </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../assets/images/game/tetris/Tetris side T.png">
    <link rel="stylesheet" href="tetriStyle.css">
</head>

<body>

    <h1 class="title-tetris">Tetris</h1>

    <div class="game-area">
        <div id="game-container">
            <canvas id="canvas-area" width="300" height="500"></canvas>
        </div>

        <div class="side-panel"> 
            <canvas id="panel-canvas" width="80" height=" 80"></canvas>
        </div>

        <div class="controls-guide">
            <strong>Controls:</strong> Arrow keys to Move/Rotate | Space to Hard Drop | Enter to Start/Restart
        </div>
    </div>


    <script src="tetriScript.js" defer></script>
</body>
</html>
