<html>
    <head>
        <meta charset="UTF-8" />
        <title> PI </title>
        <link rel="icon" type="image/png" href="">
        <link rel="stylesheet" href="pi.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40..48,100..700,0..1,-50..200&icon_names=visibility" />    </head>

    <body>

        <!---Calculator--->
        <div class="calculator">
            <div class="display">
                <div class="sequence">3.14<div class="sequence-after"></div><div class="blink-cursor"><span class="clue-text"></span></div></div>
            </div>

            <div class="num-pad">
                <div class="num-1">1</div>
                <div class="num-2">2</div>
                <div class="num-3">3</div>
                <div class="num-4">4</div>
                <div class="num-5">5</div>
                <div class="num-6">6</div>
                <div class="num-7">7</div>
                <div class="num-8">8</div>
                <div class="num-9">9</div>
                <div class="cross">X</div>
                <div class="num-0">0</div>
                <div class="material-symbols-outlined">visibility</div>
            </div>
        </div>

        <script src="pi.js" defer></script>
    </body>
</html>
