<html>
    <head>
        <meta charset="UTF-8">
        <title> Hangman </title>
        <link rel="icon" type="image/png" href="">
        <link rel="stylesheet" href="hangman.css">
    </head>

    <body>
        <!---Loading Screen--->
        <div class="loading-screen">
            <div id="buttons"></div>
        </div>

        <div class="game-area">
            <svg class="header">
                <text x="0" y="70%">Hangman</text>
            </svg>
       
            <!---Questions & answers box--->
            <div class="QNA-box">
                <div class="question"></div>
                <div class="answer-box">
                    <div class="box-container"></div>
                </div>
            </div>
       
            <!---Buttons and areas--->
            <div class="back-button-area"></div>
            <div class="back-button"></div>
            <div class="restart-button-area"></div>
            <div class="restart-button"></div>
       
            <!---Hanging post--->
            <div class="hang-post">
       
                <!---The man itself--->
                <div class="head"></div>

                <div class="arms">
                    <div class="arm-left"></div>
                    <div class="arm-right"></div>
                </div>       
                
                <div class="trunk"></div>

                <div class="legs">
                    <div class="leg-left"></div>
                    <div class="leg-right"></div>
                </div>
            
                <!---Hanging Post--->
                <div class="shaft"></div>
                <div class="nail-SH"></div>
            
                <div class="hanger"></div>

                <div class="nail-HH"></div>
                <div class="holder"></div>
            </div>
        </div>

        <script src="hangman.js"></script>
    </body>
</html>
