<html>
    <meta charset="UTF-8">
    <title> Hangman </title>
    <link rel="icon" type="image/png" href="">
    <link rel="stylesheet" href="hangman.css">

    <body>
        <div class="QNA-box">
            <div class="question">The human anus is so fascinating, its like the human uterus, it can expand up to eight times it original size.</div>
            <div class="answer-box">
                <div class="box-container"></div>
            </div>
        </div>

        <div class="hang-post">
            <!---The man itself--->
            <div class="head"></div>
            <div class="arm-left"></div>
            <div class="arm-right"></div>

            <div class="trunk"></div>

            <div class="leg-left"></div>
            <div class="leg-right"></div>

            <!---Hanging Post--->
            <div class="shaft"></div>
            <div class="nail-SH"></div>

            <div class="hanger"></div>

            <div class="nail-HH"></div>
            <div class="holder"></div>
        </div>

        <script src="hangman.js"></script>
    </body>
</html>
