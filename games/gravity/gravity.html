<!---game intro.mp3 (calm ambient intro) by https://pixabay.com/users/lucadialessandro-25927643/--->
<html>
    <head>
        <meta charset="UTF-8" />
        <title> Gravity </title>
        <link rel="icon" type="image/png" href="../../assets/game/gravity/image/gravity.png">
        <link rel="stylesheet" href="gravityStyle.css">
    </head>

    <body>
        <!---Game area canvas--->
        <canvas id="game-area"></canvas>

        <!---Item count--->
        <div class="item-count"> <div class="planet"></div><span class="count">0</span></div>

        <!---Loading screen--->
        <div class="loading-screen">
            <div class="header"> Gravity </div>
            <img class="heavenly-body" src="../../assets/game/gravity/image/heavenly-body.svg" />
            <img class="orbit-1" src="../../assets/game/gravity/image/orbit-1.svg" />
            <img class="orbit-2" src="../../assets/game/gravity/image/orbit-2.svg" />
        </div>

        <!---Tutorial screen-->
        <div class="tutorial-screen">
            <div class="space-screen">
                PRESS
                <img class="space-img" src="../../assets/images/icon/space-icon.png" alt="SPACE" />
                TO LAUNCH COMET
            </div>

            <div class="enter-screen">
                PRESS
                <img class="enter-img" src="../../assets/images/icon/enter-icon.png" alt="ENTER" />
                TO RESTART
            </div>
        </div>

        <!---Level Island--->
        <div class="level-bar">Level: <span class="lvl-count-bar">1</span></div>
        
        <!---Game DNF / Level'd up screen (Css cuz its stylish)--->
        <div class="level-completed">Level: <span class="lvl-count">0</span></div>
        <div class="dnf">DNF!</div>
    
        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/matter-attractors@0.1.6/build/matter-attractors.min.js"></script>
        <script src="gravityScript.js" defer></script>
    </body>
</html>
